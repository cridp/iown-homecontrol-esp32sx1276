; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Show computed configuration: CTRL+SHIFT+P > PlatformIO: New Terminal
; > pio project config

[platformio]
default_envs = HeltecLoraV2ESP32
name = iownhcESP32
description = io-homecontrol for the ESP32
data_dir = ./extras

[common]
framework = arduino
;data_dir = ./data
board_build.filesystem = littlefs
lib_deps_builtin =
;	https://github.com/cridp/uEcho_esp32.git
;	D:\\git\\uEcho_esp32 ; local path to uEcho_esp32
;	SPIeX
lib_deps_external =
;	WiFiManager=
build_flags =
    -DCONFIG_SPI_MASTER_ISR_IN_IRAM=y
    -DCONFIG_SPI_SLAVE_ISR_IN_IRAM=y
    -DCONFIG_UART_ISR_IN_IRAM=y ; Necessary with littleFS ?!
;   -DCONFIG_ESP_BT_ENABLED=no
	-DCONFIG_ESP_WIFI_TASK_PINNED_TO_CORE_1=y
	-DCONFIG_ESP_TIMER_SUPPORTS_ISR_DISPATCH_METHOD=y ; Can set callback in IRAM
;	-DCONFIG_ESP_TIMER_TASK_AFFINITY_CPU0=y ; Let the scheduler decide to balance CPU load
    -DCONFIG_HEAP_CORRUPTION_DETECTION_COMPREHENSIVE
    -DCONFIG_HEAP_POISONING
    -DMALLOC_CAPS
;	-DCONFIG_COMPILER_OPTIMIZATION_PERF=y ; Equivalent to -O2, overridden by -O3 below
	-Wno-attributes
;	-DCONFIG_FREERTOS_GENERATE_RUN_TIME_STATS=y
;   -DCONFIG_LWIP_MULTICAST_PING=y
    -DCONFIG_LIBC_OPTIMIZED_MISALIGNED_ACCESS
    -DLFS_THREADSAFE ; Avoid erasing in case of crash (concurrencies)
	-I include

extra_scripts =

; Global data for all [env:***]
[env]
framework = ${common.framework}
platform = espressif32
;@^6.4.0
;platform_packages = platformio/framework-arduinoespressif32@^3.20011.230801
board_build.filesystem = ${common.board_build.filesystem}

; --- MONITOR/DEBUG SETTINGS ---
check_tool = cppcheck, clangtidy
check_skip_packages = yes
;prefer to check build without automatic upload
;targets = upload, monitor

lib_ldf_mode = deep
lib_deps =
	${common.lib_deps_builtin}
;	${common.lib_deps_external}
	bblanchon/ArduinoJson
 	esphome/ESPAsyncWebServer-esphome @ ^3.4.0
	esphome/AsyncTCP-esphome @ ^2.1.4
	https://github.com/HeMan/async-mqtt-client.git
	adafruit/Adafruit SSD1306 @ ^2.5.15
    tzapu/WiFiManager @ ^2.0.17
;	https://github.com/me-no-dev/ESPAsyncWebServer.git
;	luc-github/ESP32SSDP@^1.2.1
;    	WiFi
;    	256dpi/MQTT
;	https://github.com/X-Ryl669/esp-eMQTT5.git
;    	mlesniew/PicoMQTT@^0.3.8
;   	me-no-dev/AsyncTCP@^1.1.1
;	marvinroger/AsyncMqttClient@^0.9.0
;	jbtronics/ESP32Console ;@^1.2.2
; 	Warning, comment with '#' the line "libLDFMode": "chain+" in .pio/.../library.json
;	https://github.com/jgromes/RadioLib.git@6.6.0

upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200
monitor_echo = true
monitor_filters = esp32_exception_decoder, send_on_enter, time, colorize

; Custom debug group can be use in [env:***] via ${debug.***}
[env:debug]
build_type = debug
; Set optimization level and amount of debug info generated by the compiler
debug_build_flags = -O0 -ggdb3 -g3

[extra]
build_flags =
;	!python git_rev_macro.py
;	-DWM_MDNS
	-std=gnu++2a 			;gnu++17; required to set >gnu++17 (or higher), for map lib to use "insert_or_assign()"
	-O3

[env:HeltecLoraV2ESP32]

board = heltec_wifi_lora_32_V2
build_unflags =
	-std=gnu++11			
	-Os
build_flags =
	-DHELTEC
	${common.build_flags}
	${extra.build_flags}

#extra_scripts = ${common.extra_scripts}

[env:LilyGoLoraESP32]
board = ttgo-lora32-v21
board_build.partitions = no_ota.csv ;to reserve extra space for 4MB board
build_unflags =
	-std=gnu++11			
	-Os
build_flags =
	-DLILYGO
	${common.build_flags}
	${extra.build_flags}
	
#extra_scripts = ${common.extra_scripts}